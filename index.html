<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Match Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800;900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-screen" class="screen active">
        <div class="decor-cards-container">
            <div class="scattered-card scatter-1"></div>
            <div class="scattered-card scatter-2"></div>
            <div class="scattered-card scatter-3"></div>
            <div class="scattered-card scatter-4"></div>
        </div>
        
        <div class="glass-panel main-menu-panel text-center arcade-card">
            <h1 class="game-title">CARD MATCH<br>GAME</h1>
            <p class="game-subtitle">Memory Challenge</p>
            <button id="main-play-btn" class="btn btn-primary main-action-btn">START GAME</button>
        </div>
    </div>

    <div id="difficulty-screen" class="screen">
        <div class="glass-panel difficulty-panel text-center">
            <h2 class="section-title">SELECT DIFFICULTY</h2>
            <div class="difficulty-options">
                <button class="btn Selector-btn" data-difficulty="easy">EASY</button>
                <button class="btn Selector-btn" data-difficulty="medium">MEDIUM</button>
                <button class="btn Selector-btn" data-difficulty="hard">HARD</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="stats-container glass-panel setup-bar">
            <div class="stat-box">
                <span class="stat-label">Time</span>
                <span id="time-display" class="stat-value">00:00</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Moves</span>
                <span id="moves-display" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Score</span>
                <span id="score-display" class="stat-value">0</span>
            </div>
        </div>

        <div id="grid-container">
            <div id="card-grid" class="grid"></div>
        </div>

        <div class="controls-container glass-panel setup-bar">
            <button id="restart-btn" class="btn btn-control control-restart">Restart</button>
            <button id="new-game-btn" class="btn btn-control control-exit">Quit</button>
        </div>
    </div>

    <div id="win-screen" class="screen">
        <div class="glass-panel main-menu-panel text-center">
            <h2 class="victory-title">VICTORY!</h2>
            
            <div class="final-stats">
                <div class="final-stat-item"><span>SCORE</span> <strong id="final-score">0</strong></div>
                <div class="final-stat-item"><span>MOVES</span> <strong id="final-moves">0</strong></div>
                <div class="final-stat-item"><span>TIME</span> <strong id="final-time">00:00</strong></div>
            </div>

            <div class="win-actions-row">
                <button id="play-again-btn" class="btn btn-primary win-btn">RESTART</button>
                <button id="back-to-menu-btn" class="btn btn-primary win-btn">MAIN MENU</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
